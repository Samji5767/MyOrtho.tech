name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid wasted runs: cancel superseded builds on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_AI_URL: http://localhost:8000

  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:e2e

  ai-engine:
    name: AI Engine (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-engine/requirements.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      # Syntax/compile check across all modules
      - run: python -m compileall src
      - run: pytest

  docker:
    name: Compose build
    runs-on: ubuntu-latest
    needs: [frontend, backend, ai-engine]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
