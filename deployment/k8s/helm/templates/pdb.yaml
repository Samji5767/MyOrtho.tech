apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-backend-pdb
  labels:
    app: myortho-backend
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable | default 2 }}
  selector:
    matchLabels:
      app: myortho-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-frontend-pdb
  labels:
    app: myortho-frontend
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable | default 2 }}
  selector:
    matchLabels:
      app: myortho-frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-ai-engine-pdb
  labels:
    app: myortho-ai-engine
spec:
  minAvailable: {{ .Values.aiEngine.pdb.minAvailable | default 1 }}
  selector:
    matchLabels:
      app: myortho-ai-engine
