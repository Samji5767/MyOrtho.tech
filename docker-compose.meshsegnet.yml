# MeshSegNet service overlay — merge with docker-compose.yml:
#   docker-compose -f docker-compose.yml -f docker-compose.meshsegnet.yml up
#
# Defaults to MESHSEGNET_ENABLED=false for production safety.
# Set MESHSEGNET_ENABLED=true only after:
#   1. Downloading the checkpoint with scripts/download_checkpoints.sh
#   2. Verifying MESHSEGNET_SHA256 in your .env file
#   3. Completing clinical validation per docs/ENGINE_SELECTION_REPORT.md

services:
  meshsegnet-api:
    build:
      context: ./meshsegnet-service
      dockerfile: api/Dockerfile
    image: myortho/meshsegnet-api:latest
    container_name: meshsegnet-api
    restart: unless-stopped
    environment:
      MESHSEGNET_ENABLED: "${MESHSEGNET_ENABLED:-false}"
      MESHSEGNET_MODEL_VERSION: "${MESHSEGNET_MODEL_VERSION:-1.0.0}"
      CHECKPOINT_PATH: "/ckpts/meshsegnet.pth"
      CHECKPOINT_SHA256: "${MESHSEGNET_SHA256:-}"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET}"
      MAX_UPLOAD_BYTES: "${MAX_UPLOAD_BYTES:-52428800}"
      CONFIDENCE_THRESHOLD: "${SEG_CONFIDENCE_THRESHOLD:-0.50}"
      DEVICE: "${MESHSEGNET_DEVICE:-cpu}"
      MESHSEGNET_ALLOWED_PATH_DIRS: "/app/uploads:/tmp/meshsegnet_uploads"
    volumes:
      - meshsegnet-ckpts:/ckpts:ro
    # Port 8002 is NOT exposed to the host — internal Docker network only.
    # Use expose: so other services can reach it but it is not bound on the host interface.
    expose:
      - "8002"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Override ai-engine to include MeshSegNet URL and provider setting
  ai-engine:
    environment:
      MESHSEGNET_API_URL: "http://meshsegnet-api:8002"
      MESHSEGNET_ENABLED: "${MESHSEGNET_ENABLED:-false}"
    depends_on:
      meshsegnet-api:
        condition: service_healthy

volumes:
  meshsegnet-ckpts:
    driver: local

networks:
  internal:
    external: true
