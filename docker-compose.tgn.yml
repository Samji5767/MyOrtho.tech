# docker-compose.tgn.yml — MyOrtho + ToothGroupNetwork integration overlay
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tgn.yml up
#
# What this adds:
#   - tgn-api service (ToothGroupNetwork FastAPI microservice on port 8001)
#   - TGN_API_URL injected into ai-engine so it routes segmentation to TGN
#   - Shared volume between ai-engine and tgn-api for file access
#
# Prerequisites:
#   1. Build the TGN API image:
#      docker compose -f /opt/toothgroupnetwork/docker-compose.yml build tgn-api
#   2. Download checkpoints:
#      /opt/toothgroupnetwork/scripts/download_checkpoints.sh
#   3. Set INTERNAL_API_SECRET in .env
#
# Checkpoint volume:
#   Set TGNET_CKPTS_DIR to the path containing tgnet_fps.h5 and tgnet_bdl.h5
#   Defaults to /opt/toothgroupnetwork/ckpts

services:

  # ── TGN microservice ──────────────────────────────────────────────────────────
  tgn-api:
    image: toothgroupnetwork-tgn-api:latest     # built from /opt/toothgroupnetwork
    container_name: myortho-tgn-api
    ports:
      - "${TGN_API_PORT:-8001}:8001"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app/ToothGroupNetwork:/app/ToothGroupNetwork/external_libs:/app"
      WANDB_MODE: "disabled"
      TGNET_FPS_CHECKPOINT: /ckpts/tgnet_fps.h5
      TGNET_BDL_CHECKPOINT: /ckpts/tgnet_bdl.h5
      REDIS_URL: "redis://redis:6379"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-}"
      TGN_MODEL_NAME: "tgnet_fps"
      TGN_TIMEOUT_SEC: "300"
      TGN_UPLOAD_DIR: "/tmp/tgn_uploads"
    volumes:
      - "${TGNET_CKPTS_DIR:-/opt/toothgroupnetwork/ckpts}:/ckpts:ro"
      - uploads_data:/app/uploads:ro          # shared with ai-engine for by-path access
      - tgn_uploads:/tmp/tgn_uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: "4g"
          cpus: "2.0"

  # ── ai-engine: inject TGN routing ────────────────────────────────────────────
  ai-engine:
    environment:
      TGN_API_URL: "http://tgn-api:8001"
      INTERNAL_API_SECRET: "${INTERNAL_API_SECRET:-}"
      TGN_POLL_INTERVAL: "2"
      TGN_POLL_MAX_WAIT: "360"
    depends_on:
      tgn-api:
        condition: service_healthy

volumes:
  tgn_uploads:
