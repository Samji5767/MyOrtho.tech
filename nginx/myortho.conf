# nginx reverse-proxy config for myortho.tech
# Place at /etc/nginx/sites-available/myortho and symlink to sites-enabled/.
#
# Architecture:
#   Frontend (static, served by `serve`)  → localhost:3005
#   Backend  (NestJS)                     → localhost:4000
#   AI Engine                             → localhost:8000
#
# All traffic enters on 443 (HTTPS). The /api/ prefix is stripped and
# forwarded to the backend — this is what makes the relative-path fetches
# in auth.ts and client.ts work without an explicit NEXT_PUBLIC_API_URL.

server {
    listen 80;
    server_name myortho.tech www.myortho.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name myortho.tech www.myortho.tech;

    # TLS — managed by certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/myortho.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myortho.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-Frame-Options           SAMEORIGIN                            always;

    # ── Backend API ──────────────────────────────────────────────────────────
    # Strip the /api prefix and proxy to NestJS.
    # credentials (HttpOnly cookies) flow through via proxy_pass.
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow larger request bodies (scan uploads)
        client_max_body_size 50M;
    }

    # ── AI Engine ────────────────────────────────────────────────────────────
    location /ai/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        client_max_body_size 100M;
    }

    # ── Frontend static files ────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3005/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}
